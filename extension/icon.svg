<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="22" fill="#1a1a2e"/>
  <!-- Clock face -->
  <circle cx="50" cy="48" r="28" fill="none" stroke="#6c63ff" stroke-width="5"/>
  <!-- Clock hands -->
  <line x1="50" y1="48" x2="50" y2="28" stroke="#6c63ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="48" x2="65" y2="55" stroke="#a89cff" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow suggesting "later" / deferral -->
  <polyline points="68,72 78,82 68,92" fill="none" stroke="#6c63ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="22" y1="82" x2="78" y2="82" stroke="#6c63ff" stroke-width="4" stroke-linecap="round"/>
</svg>
